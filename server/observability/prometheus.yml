global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'homelab-backend'
    static_configs:
      - targets: ['backend_api:9464']
    metrics_path: '/metrics'

  - job_name: 'node'
    dns_sd_configs:
      - names:
          - 'tasks.node_exporter'
        type: A
        port: 9100
