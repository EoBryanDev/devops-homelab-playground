stream_over_http_enabled: true
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_size_bytes: 524288000 # 500MB
    keep_blocks_bytes: 10737418240 # 10GB
    retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
