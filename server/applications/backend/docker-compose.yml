version: '3.8'

services:
  backend:
    image: eobryandev/homelab-backend:latest
    networks:
      - public-overlay
    volumes:
      - sqlite-data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        # Route /api requests to the backend api
        - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls=true"
        - "traefik.http.services.backend-backend.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

volumes:
  sqlite-data:

networks:
  public-overlay:
    external: true
