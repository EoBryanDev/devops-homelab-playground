version: '3.8'

services:
  backend:
    image: eobryandev/homelab-backend:2069c57
    networks:
      - public-overlay
    volumes:
      - sqlite-data:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        # Route /backend/api requests to the backend api (uses /backend prefix to avoid conflict with Traefik dashboard API at /api)
        - "traefik.http.routers.backend.rule=PathPrefix(`/backend`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls=true"
        - "traefik.http.routers.backend.service=backend-backend"
        - "traefik.http.routers.backend.middlewares=backend-strip"
        - "traefik.http.middlewares.backend-strip.stripprefix.prefixes=/backend"
        - "traefik.http.services.backend-backend.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

volumes:
  sqlite-data:

networks:
  public-overlay:
    external: true
