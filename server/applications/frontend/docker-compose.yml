version: '3.8'

services:
  web:
    image: eobryandev/homelab-frontend:ee4f228
    networks:
      - public-overlay
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        # Route /frontend requests to the frontend (StripPrefix so nginx receives requests at / internally)
        - "traefik.http.routers.web.rule=PathPrefix(`/frontend`)"
        - "traefik.http.routers.web.entrypoints=websecure"
        - "traefik.http.routers.web.tls=true"
        - "traefik.http.routers.web.middlewares=web-strip"
        - "traefik.http.middlewares.web-strip.stripprefix.prefixes=/frontend"
        - "traefik.http.services.web.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

networks:
  public-overlay:
    external: true
