version: '3.8'

services:
  frontend:
    image: eobryandev/homelab-frontend:9bc29f4
    networks:
      - public-overlay
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        # Route /frontend requests to the frontend (StripPrefix so nginx receives requests at / internally)
        - "traefik.http.routers.frontend.rule=PathPrefix(`/frontend`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls=true"
        - "traefik.http.routers.frontend.middlewares=frontend-strip"
        - "traefik.http.middlewares.frontend-strip.stripprefix.prefixes=/frontend"
        - "traefik.http.services.frontend-frontend.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

networks:
  public-overlay:
    external: true
