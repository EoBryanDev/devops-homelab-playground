version: '3.8'

services:
  frontend:
    image: eobryandev/homelab-frontend:latest
    networks:
      - public-overlay
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        # Route root requests to the frontend
        - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls=true"
        - "traefik.http.services.frontend-frontend.loadbalancer.server.port=80"
      restart_policy:
        condition: on-failure

networks:
  public-overlay:
    external: true
